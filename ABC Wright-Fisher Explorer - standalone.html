  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ex; gap: 28px; }\n    .abc-page { padding: 36px 56px 60px; }\n    @media (max-width: 820px) {\n      .abc-row, .abc-row-tight { flex-direction: column; gap: 16px; }\n      .abc-page { padding: 20px 18px 40px; }\n    }\n  <\u002Fstyle>\n  \n<\u002Fhelmet>\n\n<div dir=\"rtl\" lang=\"he\" class=\"abc-page\" style=\"width:100%;min-height:100vh;background:#0a0e1a;color:#e8ecf4;font-family:'Heebo',system-ui,sans-serif;box-sizing:border-box;display:flex;flex-direction:column;gap:28px;overflow-x:hidden\">\n\n  <div style=\"display:flex;flex-direction:column;gap:6px\">\n    <div style=\"font-size:14px;font-weight:700;color:#7c9bff;letter-spacing:0.05em\">מודול אינטראקטיבי 2<\u002Fdiv>\n    <div style=\"font-size:30px;font-weight:800;color:#fff\">משחק ABC: גלו את הפרמטרים האבולוציוניים הנסתרים<\u002Fdiv>\n    <div style=\"font-size:16px;color:#8b97b8;max-width:1000px\">אוכלוסייה בגודל N=1000, שני אללים, 50 דורות. מדדנו את תדירות האלל לאורך זמן — עם רעש מדידה. מקדם הסלקציה (s) וקצב המוטציה (μ) האמיתיים <b style=\"color:#f87171\">נסתרים ולעולם לא יוצגו<\u002Fb>. תפקידכם: לבחור פריורי, להריץ ABC, ולקרוא את הפוסטריורי.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#0d1226;border:1px solid #232d52;border-radius:16px;padding:20px 24px\">\n    <div style=\"font-size:15px;font-weight:700;color:#e8ecf4;margin-bottom:10px\">הנתונים שנמדדו: תדירות האלל A לאורך 50 דורות (עם רעש)<\u002Fdiv>\n    <svg sc-camel-view-box=\"0 0 820 220\" style=\"width:100%;height:auto;display:block\">\n      <line x1=\"50\" y1=\"190\" x2=\"800\" y2=\"190\" stroke=\"#232d52\" stroke-width=\"2\"><\u002Fline>\n      <line x1=\"50\" y1=\"20\" x2=\"50\" y2=\"190\" stroke=\"#232d52\" stroke-width=\"2\"><\u002Fline>\n      <polyline points=\"{{ obsPolyline }}\" fill=\"none\" stroke=\"#e8ecf4\" stroke-width=\"2\"><\u002Fpolyline>\n      <sc-for list=\"{{ obsDots }}\" as=\"d\" hint-placeholder-count=\"11\">\n        <circle cx=\"{{ d.cx }}\" cy=\"{{ d.cy }}\" r=\"4.5\" fill=\"#e8ecf4\"><\u002Fcircle>\n      <\u002Fsc-for>\n      <text x=\"50\" y=\"205\" fill=\"#5b6b8c\" font-size=\"12\">דור 0<\u002Ftext>\n      <text x=\"760\" y=\"205\" fill=\"#5b6b8c\" font-size=\"12\">דור 50<\u002Ftext>\n      <text x=\"15\" y=\"24\" fill=\"#5b6b8c\" font-size=\"12\">1.0<\u002Ftext>\n      <text x=\"15\" y=\"192\" fill=\"#5b6b8c\" font-size=\"12\">0.0<\u002Ftext>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <div class=\"abc-row\">\n    <div style=\"flex:1;min-width:0;background:#121a30;border:1px solid #232d52;border-radius:16px;padding:22px 26px;display:flex;flex-direction:column;gap:14px;box-sizing:border-box\">\n      <div style=\"font-size:16px;font-weight:800;color:#ffb454\">פריורי על מקדם הסלקציה (s)<\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <button onclick=\"{{ setSPrior_uniform }}\" style=\"flex:1;padding:9px 0;border-radius:999px;border:1px solid #2a3560;background:{{ sBtnUniformBg }};color:#fff;font-size:14px;font-weight:700;cursor:pointer\">אחיד<\u002Fbutton>\n        <button onclick=\"{{ setSPrior_normal }}\" style=\"flex:1;padding:9px 0;border-radius:999px;border:1px solid #2a3560;background:{{ sBtnNormalBg }};color:#fff;font-size:14px;font-weight:700;cursor:pointer\">נורמלי<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ sIsUniform }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <label style=\"font-size:14px;color:#c3cbe0\">מינימום: {{ sMinDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"-0.3\" max=\"0.3\" step=\"0.01\" value=\"{{ sMin }}\" sc-camel-on-change=\"{{ onSMin }}\">\n          <label style=\"font-size:14px;color:#c3cbe0\">מקסימום: {{ sMaxDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"-0.3\" max=\"0.6\" step=\"0.01\" value=\"{{ sMax }}\" sc-camel-on-change=\"{{ onSMax }}\">\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ sIsNormal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <label style=\"font-size:14px;color:#c3cbe0\">ממוצע: {{ sMeanDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"-0.2\" max=\"0.4\" step=\"0.01\" value=\"{{ sMean }}\" sc-camel-on-change=\"{{ onSMean }}\">\n          <label style=\"font-size:14px;color:#c3cbe0\">סטיית תקן: {{ sStdDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"0.02\" max=\"0.3\" step=\"0.01\" value=\"{{ sStd }}\" sc-camel-on-change=\"{{ onSStd }}\">\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;min-width:0;background:#121a30;border:1px solid #232d52;border-radius:16px;padding:22px 26px;display:flex;flex-direction:column;gap:14px;box-sizing:border-box\">\n      <div style=\"font-size:16px;font-weight:800;color:#c084fc\">פריורי על קצב המוטציה (μ)<\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <button onclick=\"{{ setMuPrior_uniform }}\" style=\"flex:1;padding:9px 0;border-radius:999px;border:1px solid #2a3560;background:{{ muBtnUniformBg }};color:#fff;font-size:14px;font-weight:700;cursor:pointer\">אחיד<\u002Fbutton>\n        <button onclick=\"{{ setMuPrior_normal }}\" style=\"flex:1;padding:9px 0;border-radius:999px;border:1px solid #2a3560;background:{{ muBtnNormalBg }};color:#fff;font-size:14px;font-weight:700;cursor:pointer\">נורמלי<\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ muIsUniform }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <label style=\"font-size:14px;color:#c3cbe0\">מינימום: {{ muMinDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"-6\" max=\"-1\" step=\"0.1\" value=\"{{ muMinExp }}\" sc-camel-on-change=\"{{ onMuMinExp }}\">\n          <label style=\"font-size:14px;color:#c3cbe0\">מקסימום: {{ muMaxDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"-5\" max=\"0\" step=\"0.1\" value=\"{{ muMaxExp }}\" sc-camel-on-change=\"{{ onMuMaxExp }}\">\n          <div style=\"font-size:12px;color:#8b97b8\">סקאלה לוגריתמית — כל צעד מכפיל פי ~1.25.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ muIsNormal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <label style=\"font-size:14px;color:#c3cbe0\">ממוצע: {{ muMeanDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"-6\" max=\"-1\" step=\"0.1\" value=\"{{ muMeanExp }}\" sc-camel-on-change=\"{{ onMuMeanExp }}\">\n          <label style=\"font-size:14px;color:#c3cbe0\">סטיית תקן (סדרי גודל): {{ muStdExpDisplay }}<\u002Flabel>\n          <input dir=\"ltr\" type=\"range\" min=\"0.2\" max=\"2\" step=\"0.1\" value=\"{{ muStdExp }}\" sc-camel-on-change=\"{{ onMuStdExp }}\">\n          <div style=\"font-size:12px;color:#8b97b8\">סקאלה לוגריתמית — סטיית התקן נמדדת בסדרי גודל (פי 10).<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"abc-row-tight\" style=\"background:#121a30;border:1px solid #232d52;border-radius:16px;padding:22px 26px;box-sizing:border-box\">\n    <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:10px\">\n      <label style=\"font-size:14px;color:#c3cbe0\">מספר דגימות מהפריורי (M): {{ numSamples }}<\u002Flabel>\n      <input dir=\"ltr\" type=\"range\" min=\"50\" max=\"2000\" step=\"50\" value=\"{{ numSamples }}\" sc-camel-on-change=\"{{ onNumSamples }}\">\n    <\u002Fdiv>\n    <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:10px\">\n      <label style=\"font-size:14px;color:#c3cbe0\">אחוז קבלה (quantile ε): {{ quantilePct }}%<\u002Flabel>\n      <input dir=\"ltr\" type=\"range\" min=\"1\" max=\"50\" step=\"1\" value=\"{{ quantilePct }}\" sc-camel-on-change=\"{{ onQuantilePct }}\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:16px\">\n    <button onclick=\"{{ runABC }}\" style=\"background:#7c9bff;color:#0a0e1a;border:none;border-radius:999px;padding:14px 36px;font-size:16px;font-weight:800;cursor:pointer\">{{ runLabel }}<\u002Fbutton>\n    <div style=\"font-size:14.5px;color:#5b6b8c\">מדגם {{ numSamples }} זוגות (s, μ) מהפריורי, מדמה כל אחד, ושומר את ה-{{ quantilePct }}% הקרובים ביותר לנתונים.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ hasRun }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"abc-row\">\n      <div style=\"flex:1;min-width:0;background:#0d1226;border:1px solid #232d52;border-radius:16px;padding:20px 24px;display:flex;flex-direction:column;gap:14px;box-sizing:border-box\">\n        <div style=\"font-size:16px;font-weight:800;color:#fff\">התפלגות פוסטריורית משותפת (s, μ)<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#8b97b8;white-space:pre-line\">צבע = צפיפות מוחלקת (KDE) של הזוגות שהתקבלו.\nאמד: s ≈ {{ sPostMean }}, μ ≈ {{ muPostMean }}<\u002Fdiv>\n        <svg sc-camel-view-box=\"0 0 400 340\" style=\"width:100%;height:auto;display:block\">\n          <sc-for list=\"{{ kdeCells }}\" as=\"c\" hint-placeholder-count=\"196\">\n            <rect x=\"{{ c.x }}\" y=\"{{ c.y }}\" width=\"{{ c.w }}\" height=\"{{ c.h }}\" fill=\"{{ c.fill }}\"><\u002Frect>\n          <\u002Fsc-for>\n          <line x1=\"40\" y1=\"10\" x2=\"40\" y2=\"290\" stroke=\"#7d89a8\" stroke-width=\"1.5\"><\u002Fline>\n          <line x1=\"40\" y1=\"290\" x2=\"380\" y2=\"290\" stroke=\"#7d89a8\" stroke-width=\"1.5\"><\u002Fline>\n          <sc-for list=\"{{ kdeSTicks }}\" as=\"tk\" hint-placeholder-count=\"5\">\n            <line x1=\"{{ tk.x }}\" y1=\"286\" x2=\"{{ tk.x }}\" y2=\"294\" stroke=\"#7d89a8\" stroke-width=\"1.5\"><\u002Fline>\n            <text x=\"{{ tk.x }}\" y=\"308\" fill=\"#c3cbe0\" font-size=\"11.5\" text-anchor=\"middle\">{{ tk.label }}<\u002Ftext>\n          <\u002Fsc-for>\n          <sc-for list=\"{{ kdeMuTicks }}\" as=\"tk\" hint-placeholder-count=\"5\">\n            <line x1=\"36\" y1=\"{{ tk.y }}\" x2=\"44\" y2=\"{{ tk.y }}\" stroke=\"#7d89a8\" stroke-width=\"1.5\"><\u002Fline>\n            <text x=\"30\" y=\"{{ tk.y }}\" fill=\"#c3cbe0\" font-size=\"11.5\" text-anchor=\"end\" dominant-baseline=\"middle\">{{ tk.label }}<\u002Ftext>\n          <\u002Fsc-for>\n          <text x=\"210\" y=\"330\" fill=\"#c3cbe0\" font-size=\"13\" text-anchor=\"middle\">מקדם סלקציה s →<\u002Ftext>\n          <text x=\"10\" y=\"150\" fill=\"#c3cbe0\" font-size=\"13\" text-anchor=\"middle\" transform=\"rotate(-90 10 150)\">קצב מוטציה μ →<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"font-size:13.5px;color:#c3cbe0\">התקבלו {{ acceptedCount }} מתוך {{ numSamples }} זוגות מועמדים.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;min-width:0;background:#0d1226;border:1px solid #232d52;border-radius:16px;padding:20px 24px;display:flex;flex-direction:column;gap:10px;box-sizing:border-box\">\n        <div style=\"font-size:16px;font-weight:800;color:#fff\">בדיקת חיזוי פוסטריורי (PPC)<\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#8b97b8\">כל קו ירוק = הדמיה חדשה (מקרית מחדש) מתוך זוג (s, μ) שהתקבל — לא אותה הרצה ששימשה להשוואה. הפיזור שאתם רואים הוא אי-הוודאות האמיתית של המודל.<\u002Fdiv>\n        <svg sc-camel-view-box=\"0 0 820 220\" style=\"width:100%;height:auto;display:block\">\n          <line x1=\"50\" y1=\"190\" x2=\"800\" y2=\"190\" stroke=\"#232d52\" stroke-width=\"2\"><\u002Fline>\n          <line x1=\"50\" y1=\"20\" x2=\"50\" y2=\"190\" stroke=\"#232d52\" stroke-width=\"2\"><\u002Fline>\n          <sc-for list=\"{{ ppcLines }}\" as=\"ln\" hint-placeholder-count=\"40\">\n            <polyline points=\"{{ ln.points }}\" fill=\"none\" stroke=\"#5be08a\" stroke-width=\"1.3\" opacity=\"0.35\"><\u002Fpolyline>\n          <\u002Fsc-for>\n          <polyline points=\"{{ obsPolyline }}\" fill=\"none\" stroke=\"#e8ecf4\" stroke-width=\"2.5\"><\u002Fpolyline>\n          <sc-for list=\"{{ obsDots }}\" as=\"d\" hint-placeholder-count=\"11\">\n            <circle cx=\"{{ d.cx }}\" cy=\"{{ d.cy }}\" r=\"4.5\" fill=\"#e8ecf4\"><\u002Fcircle>\n          <\u002Fsc-for>\n          <text x=\"50\" y=\"205\" fill=\"#c3cbe0\" font-size=\"12\">דור 0<\u002Ftext>\n          <text x=\"760\" y=\"205\" fill=\"#c3cbe0\" font-size=\"12\">דור 50<\u002Ftext>\n          <text x=\"15\" y=\"24\" fill=\"#c3cbe0\" font-size=\"12\">1.0<\u002Ftext>\n          <text x=\"15\" y=\"192\" fill=\"#c3cbe0\" font-size=\"12\">0.0<\u002Ftext>\n        <\u002Fsvg>\n        <div style=\"display:flex;gap:18px;font-size:13px;font-weight:600\">\n          <div style=\"color:#5be08a\">— הדמיות מהפוסטריורי<\u002Fdiv>\n          <div style=\"color:#e8ecf4\">— נתונים שנמדדו<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nfunction mulberry32(a) {\n  return function () {\n    a |= 0; a = (a + 0x6D2B79F5) | 0;\n    let t = Math.imul(a ^ (a >>> 15), 1 | a);\n    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;\n    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;\n  };\n}\nfunction gaussianFrom(rng) {\n  const u1 = Math.max(rng(), 1e-9), u2 = rng();\n  return Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);\n}\nfunction clip01(x) { return Math.min(1, Math.max(0, x)); }\nfunction fmtMu(v) {\n  if (!(v > 0)) return '0';\n  return parseFloat(v.toPrecision(2)).toString();\n}\nfunction densityColor(t) {\n  const stops = [[13, 18, 38], [91, 157, 255], [192, 132, 252], [255, 180, 84]];\n  const seg = Math.min(2, Math.floor(t * 3));\n  const lt = t * 3 - seg;\n  const a = stops[seg], b = stops[seg + 1];\n  const r = Math.round(a[0] + (b[0] - a[0]) * lt);\n  const g = Math.round(a[1] + (b[1] - a[1]) * lt);\n  const bl = Math.round(a[2] + (b[2] - a[2]) * lt);\n  return 'rgb(' + r + ',' + g + ',' + bl + ')';\n}\n\nconst POP_N = 1000, GENS = 50, P0 = 0.1;\nconst SAMPLE_GENS = [0, 10, 20, 30, 40, 50];\n\nfunction simulateWFTraj(s, mu, rngFn) {\n  let p = P0;\n  const traj = [p];\n  for (let g = 0; g < GENS; g++) {\n    let pSel = (p * (1 + s)) / (1 + s * p);\n    pSel = clip01(pSel);\n    let pMut = pSel * (1 - mu) + (1 - pSel) * mu;\n    pMut = clip01(pMut);\n    const variance = Math.max(0, (pMut * (1 - pMut)) / POP_N);\n    const sd = Math.sqrt(variance);\n    p = clip01(pMut + sd * gaussianFrom(rngFn));\n    traj.push(p);\n  }\n  return traj;\n}\n\nclass Component extends DCLogic {\n  state = {\n    sType: 'uniform', sMin: -0.05, sMax: 0.4, sMean: 0.1, sStd: 0.15,\n    muType: 'uniform', muMinExp: -5, muMaxExp: -1, muMeanExp: -2.5, muStdExp: 1.2,\n    numSamples: 400, quantilePct: 10,\n    hasRun: false, acceptedCount: 0,\n    sHist: null, muHist: null, ppcLines: '', sPostMean: '', muPostMean: '',\n  };\n\n  componentDidMount() {\n    // hidden ground truth — never exposed via renderVals or the template\n    const trueS = 0.2, trueMu = 0.001;\n    const rngTrue = mulberry32(4242);\n    const traj = simulateWFTraj(trueS, trueMu, rngTrue);\n    const rngNoise = mulberry32(1357);\n    this.observed = SAMPLE_GENS.map((g) => clip01(traj[g] + 0.45 * gaussianFrom(rngNoise)));\n    this.forceUpdate();\n  }\n\n  onSMin = (e) => this.setState({ sMin: parseFloat(e.target.value) });\n  onSMax = (e) => this.setState({ sMax: parseFloat(e.target.value) });\n  onSMean = (e) => this.setState({ sMean: parseFloat(e.target.value) });\n  onSStd = (e) => this.setState({ sStd: parseFloat(e.target.value) });\n  onMuMinExp = (e) => this.setState({ muMinExp: parseFloat(e.target.value) });\n  onMuMaxExp = (e) => this.setState({ muMaxExp: parseFloat(e.target.value) });\n  onMuMeanExp = (e) => this.setState({ muMeanExp: parseFloat(e.target.value) });\n  onMuStdExp = (e) => this.setState({ muStdExp: parseFloat(e.target.value) });\n  onNumSamples = (e) => this.setState({ numSamples: parseInt(e.target.value, 10) });\n  onQuantilePct = (e) => this.setState({ quantilePct: parseInt(e.target.value, 10) });\n\n  setSPrior_uniform = () => this.setState({ sType: 'uniform' });\n  setSPrior_normal = () => this.setState({ sType: 'normal' });\n  setMuPrior_uniform = () => this.setState({ muType: 'uniform' });\n  setMuPrior_normal = () => this.setState({ muType: 'normal' });\n\n  runABC = () => {\n    const s = this.state;\n    const rng = mulberry32(Date.now() % 2147483647);\n    const M = s.numSamples;\n    const drawS = () => {\n      if (s.sType === 'uniform') return s.sMin + rng() * (s.sMax - s.sMin);\n      return Math.max(-0.4, Math.min(0.7, s.sMean + s.sStd * gaussianFrom(rng)));\n    };\n    const drawMu = () => {\n      if (s.muType === 'uniform') return Math.pow(10, s.muMinExp + rng() * (s.muMaxExp - s.muMinExp));\n      const exp = Math.max(-8, Math.min(-1, s.muMeanExp + s.muStdExp * gaussianFrom(rng)));\n      return Math.pow(10, exp);\n    };\n\n    const candidates = [];\n    for (let i = 0; i < M; i++) {\n      const sv = drawS(), muv = drawMu();\n      const traj = simulateWFTraj(sv, muv, rng);\n      let dist = 0;\n      for (let j = 0; j < SAMPLE_GENS.length; j++) {\n        const diff = traj[SAMPLE_GENS[j]] - this.observed[j];\n        dist += diff * diff;\n      }\n      candidates.push({ s: sv, mu: muv, traj, dist });\n    }\n    candidates.sort((a, b) => a.dist - b.dist);\n    const keep = candidates.slice(0, Math.max(2, Math.round(M * (s.quantilePct / 100))));\n    // posterior predictive check: fresh stochastic re-simulations per accepted (s, mu) —\n    // NOT the same run used to judge acceptance, so real drift variance shows up.\n    keep.forEach((c) => { c.freshTraj = simulateWFTraj(c.s, c.mu, rng); });\n\n    this._accepted = keep;\n    this.setState({ hasRun: true, acceptedCount: keep.length });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const obsX0 = 50, obsX1 = 800, obsY0 = 20, obsY1 = 190;\n    const genToX = (g) => obsX0 + (g / GENS) * (obsX1 - obsX0);\n    const freqToY = (f) => obsY1 - f * (obsY1 - obsY0);\n\n    const observed = this.observed || SAMPLE_GENS.map(() => 0.5);\n    const obsDots = SAMPLE_GENS.map((g, i) => ({ cx: genToX(g), cy: freqToY(observed[i]) }));\n    const obsPolyline = obsDots.map((d) => d.cx + ',' + d.cy).join(' ');\n\n    let sPostMean = '', muPostMean = '';\n    let kdeCells = [], kdeSTicks = [], kdeMuTicks = [];\n    if (s.hasRun && this._accepted && this._accepted.length) {\n      const accepted = this._accepted;\n      const sVals = accepted.map((c) => c.s);\n      const logMuVals = accepted.map((c) => Math.log10(c.mu));\n      const mean = (arr) => arr.reduce((a, c) => a + c, 0) / arr.length;\n      sPostMean = mean(sVals).toFixed(3);\n      muPostMean = fmtMu(mean(accepted.map((c) => c.mu)));\n\n      const pad = 0.15;\n      let sLo = Math.min(...sVals), sHi = Math.max(...sVals);\n      let sSpan = (sHi - sLo) || 0.05; sLo -= sSpan * pad; sHi += sSpan * pad;\n      let mLo = Math.min(...logMuVals), mHi = Math.max(...logMuVals);\n      let mSpan = (mHi - mLo) || 0.3; mLo -= mSpan * pad; mHi += mSpan * pad;\n\n      // Gaussian-kernel density estimate, evaluated on a grid (no calculus — just weighted sums)\n      const n = accepted.length;\n      const std = (arr) => { const m = mean(arr); return Math.sqrt(arr.reduce((a, v) => a + (v - m) * (v - m), 0) / arr.length) || 1e-6; };\n      const bwS = Math.max(1.06 * std(sVals) * Math.pow(n, -0.2), 1e-4);\n      const bwM = Math.max(1.06 * std(logMuVals) * Math.pow(n, -0.2), 1e-3);\n\n      const N_GRID = 26;\n      const gx0 = 40, gx1 = 380, gy0 = 10, gy1 = 290;\n      const cellW = (gx1 - gx0) / N_GRID, cellH = (gy1 - gy0) / N_GRID;\n      const dens = Array.from({ length: N_GRID }, () => new Array(N_GRID).fill(0));\n      for (let cy = 0; cy < N_GRID; cy++) {\n        const mCenter = mLo + (mHi - mLo) * ((cy + 0.5) / N_GRID);\n        for (let cx = 0; cx < N_GRID; cx++) {\n          const sCenter = sLo + (sHi - sLo) * ((cx + 0.5) / N_GRID);\n          let acc = 0;\n          for (let k = 0; k < n; k++) {\n            const ds = (sCenter - sVals[k]) / bwS;\n            const dm = (mCenter - logMuVals[k]) / bwM;\n            acc += Math.exp(-0.5 * (ds * ds + dm * dm));\n          }\n          dens[cy][cx] = acc;\n        }\n      }\n      let maxDens = 1e-9;\n      dens.forEach((row) => row.forEach((v) => { if (v > maxDens) maxDens = v; }));\n      for (let cy = 0; cy < N_GRID; cy++) {\n        for (let cx = 0; cx < N_GRID; cx++) {\n          const t = dens[cy][cx] / maxDens;\n          kdeCells.push({\n            x: gx0 + cx * cellW, y: gy1 - (cy + 1) * cellH, w: cellW + 0.6, h: cellH + 0.6,\n            fill: densityColor(t),\n          });\n        }\n      }\n      const kx0 = 40, kx1 = 380, ky0 = 10, ky1 = 290;\n      kdeSTicks = [0, 0.25, 0.5, 0.75, 1].map((f) => ({ x: kx0 + (kx1 - kx0) * f, label: (sLo + (sHi - sLo) * f).toFixed(2) }));\n      kdeMuTicks = [0, 0.25, 0.5, 0.75, 1].map((f) => ({ y: ky1 - (ky1 - ky0) * f, label: fmtMu(Math.pow(10, mLo + (mHi - mLo) * f)) }));\n    }\n    let ppcLines = [];\n    if (s.hasRun && this._accepted && this._accepted.length) {\n      ppcLines = this._accepted.slice(0, 60).map((c) => ({\n        points: c.freshTraj.map((p, g) => genToX(g) + ',' + freqToY(p)).join(' '),\n      }));\n    }\n\n    return {\n      sIsUniform: s.sType === 'uniform', sIsNormal: s.sType === 'normal',\n      muIsUniform: s.muType === 'uniform', muIsNormal: s.muType === 'normal',\n      sBtnUniformBg: s.sType === 'uniform' ? '#ffb454' : '#182142',\n      sBtnNormalBg: s.sType === 'normal' ? '#ffb454' : '#182142',\n      muBtnUniformBg: s.muType === 'uniform' ? '#c084fc' : '#182142',\n      muBtnNormalBg: s.muType === 'normal' ? '#c084fc' : '#182142',\n      sMin: s.sMin, sMinDisplay: s.sMin.toFixed(2), sMax: s.sMax, sMaxDisplay: s.sMax.toFixed(2),\n      sMean: s.sMean, sMeanDisplay: s.sMean.toFixed(2), sStd: s.sStd, sStdDisplay: s.sStd.toFixed(2),\n      muMinExp: s.muMinExp, muMinDisplay: fmtMu(Math.pow(10, s.muMinExp)),\n      muMaxExp: s.muMaxExp, muMaxDisplay: fmtMu(Math.pow(10, s.muMaxExp)),\n      muMeanExp: s.muMeanExp, muMeanDisplay: fmtMu(Math.pow(10, s.muMeanExp)),\n      muStdExp: s.muStdExp, muStdExpDisplay: '×10^' + s.muStdExp.toFixed(1),\n      onSMin: this.onSMin, onSMax: this.onSMax, onSMean: this.onSMean, onSStd: this.onSStd,\n      onMuMinExp: this.onMuMinExp, onMuMaxExp: this.onMuMaxExp, onMuMeanExp: this.onMuMeanExp, onMuStdExp: this.onMuStdExp,\n      setSPrior_uniform: this.setSPrior_uniform, setSPrior_normal: this.setSPrior_normal,\n      setMuPrior_uniform: this.setMuPrior_uniform, setMuPrior_normal: this.setMuPrior_normal,\n      runABC: this.runABC, runLabel: s.hasRun ? 'הרץ שוב' : 'הרץ ABC',\n      numSamples: s.numSamples, onNumSamples: this.onNumSamples,\n      quantilePct: s.quantilePct, onQuantilePct: this.onQuantilePct,\n      obsPolyline, obsDots,\n      hasRun: s.hasRun, acceptedCount: s.acceptedCount,\n      kdeCells, kdeSTicks, kdeMuTicks, ppcLines, sPostMean, muPostMean,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
